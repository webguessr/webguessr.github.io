<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title></title>
		<!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" > -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" >
		<link rel="stylesheet" href="styles.css">

		<script src="app.js"></script>
		<script defer src="data-sample.js"></script>
		<script src="round.js"></script>

		<style>
		.controlcontainer {
			position: static;

			button {
				display: none;
			}
		}

		 /* .control {
			border: 5px solid black;
			margin: 2em;
			} */

		body {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 1em;
		}

		iframe {
			width: 600px;
			height: 400px;
			flex-shrink: 0;
		}
		</style>
	</head>

	<script type="text/javascript">
	(async () => {
		const wg = await WebGuessr.fromSaved(window.location.search);
		window.wg = wg;
		const results_cp_tb = document.createElement("textarea");
		results_cp_tb.id = "results";
		document.body.appendChild(results_cp_tb);
		const markers = ["🟩", "🟨", "🟧", "🟥"];
		let results_cp = `Score: ${wg.game.score}/25000 (${wg.game.score/250}%): `;
		for (const round_num of Object.keys(wg.game.rounds)) {
			const round = wg.game.rounds[round_num];
			const round_ui = await Round.create();
			round_ui.inputControls.hidden = false;
			document.body.appendChild(round_ui.round_el);
			round_ui.init();
			round_ui.load(new Date(round.timestamp).getFullYear(), round.archived_url);
			round_ui.inputControls.hidden = true;
			round_ui.resultsControls.hidden = false;
			round_ui.points.value = round.points;
			round_ui.total.value = wg.game.score;

			results_cp += markers[Math.floor(round.points/5000 * markers.length)];
		}
		document.getElementById("results").value = results_cp;
	})().catch(console.error);
	</script>
</html>
